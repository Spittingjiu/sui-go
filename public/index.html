<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>sui-go Panel</title>
  <style>
    :root{
      --bg:#0b1020;
      --bg2:#121a31;
      --card:rgba(20,28,52,.72);
      --line:rgba(255,255,255,.12);
      --text:#e8ecff;
      --muted:#9da9d2;
      --pri:#6ea8fe;
      --ok:#34d399;
      --err:#f87171;
      --warn:#fbbf24;
      --shadow:0 20px 50px rgba(0,0,0,.38);
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      color:var(--text);
      background:
        radial-gradient(1200px 500px at 20% -10%, #243056 0%, transparent 60%),
        radial-gradient(1000px 500px at 100% 0%, #1f3650 0%, transparent 55%),
        linear-gradient(180deg,var(--bg) 0%, var(--bg2) 100%);
      min-height:100vh;
      padding:28px 14px;
    }
    .wrap{max-width:1220px;margin:0 auto}
    .topbar{
      display:flex;align-items:center;justify-content:space-between;gap:12px;
      margin-bottom:14px;
    }
    .brand{display:flex;gap:10px;align-items:center}
    .logo{
      width:34px;height:34px;border-radius:10px;
      background:linear-gradient(145deg,#7aa2ff,#58d1ff);
      box-shadow:0 8px 24px rgba(110,168,254,.45);
    }
    h1{margin:0;font-size:20px;letter-spacing:.2px}
    .sub{font-size:12px;color:var(--muted)}

    .status-pill{
      border:1px solid var(--line);
      background:rgba(255,255,255,.05);
      color:var(--muted);
      border-radius:999px;
      padding:7px 12px;
      font-size:12px;
    }

    .grid{display:grid;grid-template-columns:1fr;gap:12px}
    @media (min-width:1080px){
      .grid{grid-template-columns:1.15fr .85fr}
    }

    .card{
      border:1px solid var(--line);
      background:var(--card);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-radius:16px;
      box-shadow:var(--shadow);
      padding:14px;
    }
    .card h3{margin:2px 0 12px 0;font-size:14px;letter-spacing:.2px;color:#dce4ff}

    .row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
    .row.tight{gap:6px}

    input,select,button{
      border-radius:10px;
      border:1px solid var(--line);
      background:rgba(8,12,24,.5);
      color:var(--text);
      height:36px;
      padding:0 11px;
      font-size:13px;
      outline:none;
      transition:.18s ease;
    }
    input::placeholder{color:#8fa0cf}
    input:focus,select:focus{
      border-color:rgba(110,168,254,.6);
      box-shadow:0 0 0 3px rgba(110,168,254,.18);
    }

    button{
      cursor:pointer;
      background:linear-gradient(180deg,rgba(110,168,254,.28),rgba(88,130,222,.2));
      border-color:rgba(110,168,254,.45);
      color:#ecf3ff;
      font-weight:600;
    }
    button:hover{transform:translateY(-1px);filter:brightness(1.06)}
    button.ghost{
      background:rgba(255,255,255,.04);
      border-color:var(--line);
      color:#d7def8;
      font-weight:500;
    }
    button.danger{
      background:linear-gradient(180deg,rgba(248,113,113,.35),rgba(220,38,38,.26));
      border-color:rgba(248,113,113,.55);
    }

    .w-sm{width:120px}
    .w-md{width:160px}
    .w-lg{width:220px}

    .ok{color:var(--ok)}
    .err{color:var(--err)}

    .muted{font-size:12px;color:var(--muted)}

    table{width:100%;border-collapse:separate;border-spacing:0}
    th,td{
      border-bottom:1px solid rgba(255,255,255,.08);
      padding:10px 8px;
      text-align:left;
      font-size:13px;
      vertical-align:middle;
    }
    th{color:#b8c4ea;font-weight:600;background:rgba(255,255,255,.02)}
    tr:hover td{background:rgba(255,255,255,.02)}

    .tag{
      display:inline-block;padding:2px 8px;border-radius:999px;
      border:1px solid rgba(110,168,254,.35);
      color:#cfe0ff;background:rgba(110,168,254,.12);
      font-size:11px;
    }

    .ops{display:flex;gap:6px;flex-wrap:wrap}
    .ops button{height:30px;padding:0 9px;font-size:12px}

    pre{
      margin:10px 0 0;
      white-space:pre-wrap;
      word-break:break-word;
      background:rgba(2,8,20,.58);
      border:1px solid rgba(255,255,255,.1);
      border-radius:12px;
      padding:10px 12px;
      color:#cdd8ff;
      max-height:280px;
      overflow:auto;
      font-size:12px;
      line-height:1.55;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div class="brand">
        <div class="logo"></div>
        <div>
          <h1>sui-go 控制台</h1>
          <div class="sub">简洁高端风 · 对标 s-ui 操作流</div>
        </div>
      </div>
      <div id="loginStatus" class="status-pill">未登录</div>
    </div>

    <div class="grid">
      <div>
        <div class="card">
          <h3>账号会话</h3>
          <div class="row tight">
            <input id="u" class="w-md" placeholder="username" value="admin" />
            <input id="p" class="w-md" placeholder="password" type="password" value="admin123" />
            <button id="login">登录</button>
            <button id="refresh" class="ghost">刷新 token</button>
            <button id="logout" class="ghost">退出</button>
          </div>
        </div>

        <div class="card">
          <h3>Inbound 编辑器</h3>
          <div class="row">
            <input id="id" class="w-sm" placeholder="id" />
            <select id="proto" class="w-md">
              <option value="hysteria">hysteria2 (hy2)</option>
              <option value="vless">vless</option>
              <option value="vmess">vmess</option>
              <option value="trojan">trojan</option>
              <option value="shadowsocks">shadowsocks</option>
            </select>
            <input id="remark" class="w-lg" placeholder="remark" value="hy2-mvp" />
            <input id="port" class="w-sm" placeholder="port" value="24433" />
            <input id="uuid" class="w-lg" placeholder="uuid(vless/vmess)" />
            <input id="pwd" class="w-lg" placeholder="password(hy2/trojan/ss)" value="abc123" />
            <input id="method" class="w-md" placeholder="ss method" value="aes-128-gcm" />
            <input id="net" class="w-md" placeholder="network" value="hysteria" />
            <select id="sec" class="w-md">
              <option value="">security (none)</option>
              <option value="tls">tls</option>
              <option value="reality">reality</option>
            </select>
            <input id="host" class="w-md" placeholder="host(ws/http)" />
            <input id="path" class="w-md" placeholder="path(ws/xhttp)" />
            <input id="realityDest" class="w-lg" placeholder="reality dest host:port" />
            <input id="shortId" class="w-md" placeholder="reality shortId" />
            <input id="publicKey" class="w-lg" placeholder="reality publicKey" />
            <input id="sni" class="w-md" placeholder="sni" value="www.bing.com" />
            <input id="hopPorts" class="w-lg" placeholder="hy2HopPorts" value="25000-25010" />
            <input id="hopInt" class="w-md" placeholder="hy2HopInterval" value="20-40" />
          </div>
          <div class="row" style="margin-top:10px">
            <button id="add">新增</button>
            <button id="save">保存 /full</button>
            <button id="reset" class="ghost">清空</button>
            <div class="muted">提示：先在列表点“编辑”再保存。</div>
          </div>
          <pre id="addOut"></pre>
        </div>

        <div class="card">
          <h3>Inbounds 列表</h3>
          <div class="row"><button id="load" class="ghost">刷新列表</button></div>
          <table>
            <thead><tr><th>ID</th><th>备注</th><th>协议</th><th>端口</th><th>操作</th></tr></thead>
            <tbody id="tb"></tbody>
          </table>
          <pre id="linkOut"></pre>
        </div>
      </div>

      <div>
        <div class="card">
          <h3>Xray 配置工作台</h3>
          <div class="row">
            <button id="cfgShow" class="ghost">查看配置 JSON</button>
            <button id="cfgExport" class="ghost">导出到文件</button>
            <button id="cfgApply">导出并 Reload</button>
          </div>
          <pre id="cfgOut"></pre>
        </div>
      </div>
    </div>
  </div>

<script>
let token = localStorage.getItem('sui_go_token') || '';
const $ = id => document.getElementById(id);

async function api(url, opt={}){
  const h = Object.assign({'content-type':'application/json'}, opt.headers||{});
  if(token) h['Authorization'] = 'Bearer ' + token;
  const r = await fetch(url, {...opt, headers:h});
  const j = await r.json().catch(()=>({success:false,msg:'invalid json'}));
  if(!r.ok) throw new Error(j.msg || ('http '+r.status));
  return j;
}

function setStatus(msg, ok=true){
  const el=$('loginStatus');
  el.textContent=msg;
  el.className='status-pill '+(ok?'ok':'err');
}

async function doLogin(){
  try{
    const j = await api('/auth/login', {method:'POST', body: JSON.stringify({username:$('u').value,password:$('p').value})});
    token = j.token || '';
    localStorage.setItem('sui_go_token', token);
    setStatus('已登录');
  }catch(e){ setStatus('登录失败: '+e.message, false); }
}

async function doRefresh(){
  try{
    const j = await api('/auth/refresh', {method:'POST'});
    token = j.token || '';
    localStorage.setItem('sui_go_token', token);
    setStatus('token 已刷新');
  }catch(e){ setStatus('刷新失败: '+e.message, false); }
}

async function doLogout(){
  try{ await api('/auth/logout', {method:'POST'}); }catch(_e){}
  token=''; localStorage.removeItem('sui_go_token');
  setStatus('已退出');
}

function getPayload(){
  return {
    remark:$('remark').value,
    port:Number($('port').value),
    protocol:$('proto').value,
    uuid:$('uuid').value,
    password:$('pwd').value,
    method:$('method').value,
    network:$('net').value,
    security:$('sec').value,
    host:$('host').value,
    path:$('path').value,
    realityDest:$('realityDest').value,
    shortId:$('shortId').value,
    publicKey:$('publicKey').value,
    sni:$('sni').value,
    hy2HopPorts:$('hopPorts').value,
    hy2HopInterval:$('hopInt').value
  };
}

function fillForm(x){
  $('id').value = x.id || '';
  $('proto').value = x.protocol || 'hysteria';
  $('remark').value = x.remark || '';
  $('port').value = x.port || '';
  $('uuid').value = x.uuid || '';
  $('pwd').value = x.password || '';
  $('method').value = x.method || 'aes-128-gcm';
  $('net').value = x.network || '';
  $('sec').value = x.security || '';
  $('host').value = x.host || '';
  $('path').value = x.path || '';
  $('realityDest').value = x.realityDest || '';
  $('shortId').value = x.shortId || '';
  $('publicKey').value = x.publicKey || '';
  $('sni').value = x.sni || '';
  const hop = (((x.streamSettings||{}).hysteriaSettings||{}).udphop)||{};
  $('hopPorts').value = hop.ports || '';
  $('hopInt').value = hop.interval || '';
}

function resetForm(){
  $('id').value='';
  $('proto').value='hysteria';
  $('remark').value='hy2-mvp';
  $('port').value='24433';
  $('uuid').value='';
  $('pwd').value='abc123';
  $('method').value='aes-128-gcm';
  $('net').value='hysteria';
  $('sec').value='';
  $('host').value='';
  $('path').value='';
  $('realityDest').value='';
  $('shortId').value='';
  $('publicKey').value='';
  $('sni').value='www.bing.com';
  $('hopPorts').value='25000-25010';
  $('hopInt').value='20-40';
}

async function addHy2(){
  try{
    const j=await api('/api/inbounds/add',{method:'POST',body:JSON.stringify(getPayload())});
    $('addOut').textContent=JSON.stringify(j,null,2);
    fillForm(j.obj||{});
    await loadList();
  }catch(e){ $('addOut').textContent='新增失败: '+e.message; }
}

async function saveHy2(){
  const id = Number($('id').value||0);
  if(!id){ $('addOut').textContent='请先选择一条记录再保存'; return; }
  try{
    const j=await api(`/api/inbounds/${id}/full`,{method:'PUT',body:JSON.stringify(getPayload())});
    $('addOut').textContent=JSON.stringify(j,null,2);
    fillForm(j.obj||{});
    await loadList();
  }catch(e){ $('addOut').textContent='保存失败: '+e.message; }
}

async function loadList(){
  try{
    const j=await api('/api/inbounds');
    const rows=j.obj||[];
    $('tb').innerHTML = rows.map(x=>`<tr><td>${x.id}</td><td>${x.remark||''}</td><td><span class="tag">${x.protocol||''}</span></td><td>${x.port||''}</td><td><div class="ops"><button class="ghost" onclick="pickInbound(${x.id})">编辑</button><button class="danger" onclick="removeInbound(${x.id})">删除</button><button class="ghost" onclick="loadLinks(${x.id})">links</button></div></td></tr>`).join('');
  }catch(e){ $('tb').innerHTML=`<tr><td colspan="5" class="err">${e.message}</td></tr>`; }
}

async function pickInbound(id){
  try{
    const j=await api(`/api/inbounds/${id}/full`);
    fillForm(j.obj||{});
    $('addOut').textContent='已载入 ID='+id+'，可修改后点保存';
  }catch(e){ $('addOut').textContent='读取失败: '+e.message; }
}

async function removeInbound(id){
  if(!confirm('确认删除 ID='+id+' ?')) return;
  try{
    const j=await api(`/api/inbounds/${id}`, {method:'DELETE'});
    $('addOut').textContent=JSON.stringify(j,null,2);
    if(Number($('id').value||0)===id) resetForm();
    await loadList();
  }catch(e){ $('addOut').textContent='删除失败: '+e.message; }
}

async function loadLinks(id){
  try{
    const j=await api(`/api/inbounds/${id}/links`);
    $('linkOut').textContent = (j.obj||[]).join('\n');
  }catch(e){ $('linkOut').textContent='读取链接失败: '+e.message; }
}

$('login').onclick=doLogin;
$('refresh').onclick=doRefresh;
$('logout').onclick=doLogout;

async function showCfg(){
  try{
    const j=await api('/api/xray/config');
    $('cfgOut').textContent=JSON.stringify(j.obj||{}, null, 2);
  }catch(e){ $('cfgOut').textContent='读取配置失败: '+e.message; }
}

async function exportCfg(){
  try{
    const j=await api('/api/xray/export',{method:'POST'});
    $('cfgOut').textContent=JSON.stringify(j,null,2);
  }catch(e){ $('cfgOut').textContent='导出失败: '+e.message; }
}

async function applyCfg(){
  try{
    const j=await api('/api/xray/apply',{method:'POST'});
    $('cfgOut').textContent=JSON.stringify(j,null,2);
  }catch(e){ $('cfgOut').textContent='应用失败: '+e.message; }
}

$('add').onclick=addHy2;
$('save').onclick=saveHy2;
$('reset').onclick=resetForm;
$('load').onclick=loadList;
$('cfgShow').onclick=showCfg;
$('cfgExport').onclick=exportCfg;
$('cfgApply').onclick=applyCfg;

window.pickInbound = pickInbound;
window.removeInbound = removeInbound;
window.loadLinks = loadLinks;

if(token) setStatus('检测到本地 token，可直接操作');
</script>
</body>
</html>
