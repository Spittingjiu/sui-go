<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>sui-go 登录</title>
  <style>
    :root{color-scheme:light;--bg:#f5f5f7;--surface:#fff;--text:#111;--muted:#6e6e73;--line:#e8e8ed;--line-2:#d2d2d7;--ok:#1d7f43;--err:#b42318;--shadow:0 22px 60px rgba(0,0,0,.07);--font:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text","Helvetica Neue",Arial,"Noto Sans SC",sans-serif}
    *{box-sizing:border-box} html,body{background:var(--bg)} body{margin:0;min-height:100vh;display:grid;place-items:center;padding:24px;font-family:var(--font);color:var(--text);letter-spacing:-.01em}
    .wrap{width:min(980px,100%);display:grid;grid-template-columns:1fr 420px;gap:24px;align-items:center}
    .hero,.card{background:var(--surface);border:1px solid var(--line);border-radius:32px;box-shadow:var(--shadow)}
    .hero{min-height:430px;padding:42px;display:flex;flex-direction:column;justify-content:space-between}
    .badge{width:max-content;border:1px solid var(--line-2);border-radius:999px;padding:7px 12px;font-size:12px;color:var(--muted);font-weight:650;letter-spacing:.06em;text-transform:uppercase;background:#fbfbfd}
    h1{margin:20px 0 12px;font-size:56px;line-height:1;letter-spacing:-.07em;font-weight:700;color:#000}
    .desc{color:var(--muted);font-size:16px;line-height:1.7;max-width:520px} .mini{color:#86868b;font-size:12px;line-height:1.6}
    .card{padding:30px} .logo{width:48px;height:48px;border-radius:14px;background:#111;color:#fff;display:grid;place-items:center;font-weight:700;font-size:23px;letter-spacing:-.05em} .logo:after{content:"S"}
    h2{margin:18px 0 5px;font-size:26px;letter-spacing:-.04em;font-weight:650} .sub{color:var(--muted);font-size:13px;margin-bottom:20px}
    input,button{width:100%;height:46px;border-radius:999px;border:1px solid var(--line-2);background:#fff;color:#111;padding:0 16px;outline:none;font:inherit}
    input+input{margin-top:12px} input:focus{border-color:#111;box-shadow:0 0 0 4px rgba(0,0,0,.08)}
    button{margin-top:16px;cursor:pointer;background:#111;border-color:#111;color:#fff;font-weight:650;transition:transform .14s ease,opacity .14s ease} button:hover{transform:translateY(-1px)} button:active{transform:translateY(0);opacity:.78}
    .msg{margin-top:13px;min-height:20px;font-size:13px;line-height:1.5} .ok{color:var(--ok)} .err{color:var(--err)}
    @media (prefers-color-scheme: dark){:root{color-scheme:dark;--bg:#000;--surface:#1c1c1e;--text:#f5f5f7;--muted:#a1a1a6;--line:#2c2c2e;--line-2:#3a3a3c;--shadow:0 20px 55px rgba(0,0,0,.25)}h1{color:#f5f5f7}.badge{background:#2c2c2e}input{background:#1c1c1e;color:#f5f5f7}input:focus{border-color:#f5f5f7;box-shadow:0 0 0 4px rgba(255,255,255,.10)}button,.logo{background:#f5f5f7;color:#000;border-color:#f5f5f7}}
    @media(max-width:860px){.wrap{grid-template-columns:1fr}.hero{min-height:auto;padding:28px}h1{font-size:42px}.card{padding:24px}}

    @media(max-width:700px){body{padding:12px;display:block}.wrap{display:block;width:100%}.hero{min-height:auto;padding:26px 22px;border-radius:28px;margin-bottom:12px}.card{padding:22px;border-radius:28px}h1{font-size:46px}input,button{height:48px;font-size:16px}.desc{font-size:15px}.mini{margin-top:26px}}
    @media(max-width:380px){h1{font-size:40px}.hero,.card{padding:20px}}


    @media(max-width:700px){html,body{width:100%;max-width:100%;overflow-x:hidden}body{padding:8px!important;display:block!important}.wrap{display:block!important;width:100%!important;max-width:100%!important}.hero{min-height:auto!important;padding:18px 16px!important;border-radius:22px!important;margin-bottom:8px!important}.card{padding:18px 16px!important;border-radius:22px!important}h1{font-size:34px!important;margin:12px 0 6px!important}.desc{font-size:13px!important;line-height:1.42!important}.mini{display:none!important}.badge{font-size:10px!important;padding:5px 9px!important}.logo{width:40px!important;height:40px!important;border-radius:12px!important}h2{font-size:22px!important;margin:12px 0 4px!important}.sub{margin-bottom:14px!important}input,button{height:44px!important;font-size:16px!important}}
    @media(max-width:380px){h1{font-size:30px!important}.hero,.card{padding:16px 14px!important}}

  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero"><div><div class="badge">Local Preview</div><h1>sui-go</h1><div class="desc">简约、安静、克制。黑白灰为主，聚焦面板本身，不做科幻装饰。</div></div><div class="mini">Go panel · SQLite · Xray workflow · SUI bridge</div></section>
    <section class="card"><div class="logo"></div><h2>登录面板</h2><div class="sub">请输入账号密码进入控制台</div><input id="u" placeholder="用户名" value="admin" autocomplete="username" /><input id="p" type="password" placeholder="密码" autocomplete="current-password" /><button id="loginBtn">进入控制台</button><div id="msg" class="msg"></div></section>
  </div>
<script>
let token = localStorage.getItem('sui_go_token') || '';
const $ = id => document.getElementById(id);
function say(t,ok=false){const m=$('msg');m.textContent=t||'';m.className='msg '+(ok?'ok':'err');}
function fmtRetry(ts){if(!ts)return'';const ms=Number(ts)*1000-Date.now();if(ms<=0)return'可立即重试';const s=Math.ceil(ms/1000);const m=Math.floor(s/60);return `请在 ${m>0?m+'分':''}${s%60}秒后重试`;}

async function api(url,opt={}){
  const h = Object.assign({'content-type':'application/json'}, opt.headers||{});
  if(token) h['Authorization']='Bearer '+token;
  const r = await fetch(url,{...opt,headers:h});
  const j = await r.json().catch(()=>({success:false,msg:'invalid json'}));
  if(!r.ok){const e=new Error(j.msg||('http '+r.status)); e.data=j; throw e;}
  return j;
}

async function tryAuto(){
  try{
    const me = await api('/auth/me');
    if(me && me.success){ location.href='/index.html'; return; }
  }catch(_e){}
}

async function doLogin(){
  try{
    const j = await api('/auth/login',{method:'POST',body:JSON.stringify({username:($('u').value||'').trim(),password:$('p').value||''})});
    token = j.token || '';
    if(token) localStorage.setItem('sui_go_token', token);
    $('p').value='';
    say('登录成功，正在进入面板…', true);
    location.href='/index.html';
  }catch(e){
    if(e?.data?.retryAfterUnix){ say('登录受限：'+fmtRetry(e.data.retryAfterUnix), false); return; }
    say('登录失败：'+(e.message||'unknown error'), false);
  }
}
$('loginBtn').onclick=doLogin;
$('u').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
$('p').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
tryAuto();
</script>
</body>
</html>
